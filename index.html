<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-do list</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root{
    --bg:#f7f7f5;
    --surface:#ffffff;
    --surface-1:#f1efe8;
    --border:#e2e0da;
    --border-strong:#c7c4bb;
    --text:#1f1f1d;
    --text-secondary:#5f5e5a;
    --text-muted:#8b897f;
    --accent-bg:#e6f1fb;
    --accent-text:#0c447c;
    --accent-border:#378add;
    --danger:#a32d2d;
    --radius:8px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display:flex;
    justify-content:center;
    padding:40px 16px;
  }
  .app{
    width:100%;
    max-width:560px;
  }
  h1{
    font-size:22px;
    font-weight:500;
    margin:0 0 20px;
  }
  input, select, button{
    font-family:inherit;
    font-size:14px;
    border-radius:var(--radius);
    border:1px solid var(--border-strong);
    background:var(--surface);
    color:var(--text);
    padding:8px 10px;
    height:36px;
  }
  button{
    cursor:pointer;
    background:var(--surface);
  }
  button:hover{
    background:var(--surface-1);
  }
  button:active{
    transform:scale(0.98);
  }
  .row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:10px;
  }
  .row > *{ flex:1; min-width:120px; }
  .row.dates > div{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .row.dates label{
    font-size:12px;
    color:var(--text-secondary);
    white-space:nowrap;
  }
  #add-btn{ width:100%; margin-bottom:16px; }
  .filters{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:10px;
    align-items:center;
  }
  .filter-btn{ font-size:13px; padding:4px 12px; height:auto; }
  .filter-btn.active{
    background:var(--accent-bg);
    color:var(--accent-text);
    border-color:var(--accent-border);
  }
  #category-filter{ font-size:13px; height:28px; margin-left:4px; }
  #count{ margin-left:auto; font-size:13px; color:var(--text-muted); }
  #manage-toggle{ font-size:12px; padding:3px 10px; color:var(--text-muted); height:auto; }
  #manage-panel{
    display:none;
    flex-direction:column;
    gap:8px;
    margin-top:10px;
  }
  .cat-block{
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:8px 10px;
  }
  .cat-block .head{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .badge{
    font-size:12px;
    padding:2px 10px;
    border-radius:var(--radius);
  }
  .icon-btn{
    border:none;
    background:transparent;
    padding:2px;
    height:auto;
    color:var(--text-muted);
  }
  .sub-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:8px;
    padding-left:8px;
  }
  .chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    padding:2px 4px 2px 8px;
    border-radius:var(--radius);
    background:var(--surface-1);
    color:var(--text-secondary);
  }
  .chip button{
    border:none;
    background:transparent;
    padding:0 2px;
    height:auto;
    color:inherit;
    display:flex;
    align-items:center;
  }
  #list{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .task-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--surface);
  }
  .check{
    width:20px; height:20px; min-width:20px;
    border-radius:50%;
    border:1.5px solid var(--border-strong);
    background:transparent;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    height:20px;
  }
  .check.done{
    border-color:var(--accent-border);
    background:var(--accent-bg);
  }
  .mid{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
  }
  .label{
    font-size:14px;
    overflow-wrap:break-word;
  }
  .label.done{
    color:var(--text-muted);
    text-decoration:line-through;
  }
  .meta{
    display:flex;
    gap:6px;
    align-items:center;
    flex-wrap:wrap;
  }
  .meta .date{
    font-size:11px;
    color:var(--text-muted);
  }
  .del{
    border:none;
    background:transparent;
    padding:4px;
    height:auto;
    color:var(--text-muted);
  }
  #empty{
    display:none;
    text-align:center;
    padding:2rem 1rem;
    color:var(--text-muted);
    font-size:14px;
  }
  #add-cat-row, #add-subcat-row{
    display:none;
    gap:8px;
    margin-bottom:10px;
  }
</style>
</head>
<body>
<div class="app">
  <h1>To-do list</h1>

  <div class="row">
    <input id="new-task" type="text" placeholder="Add a task" style="flex:2;" />
    <select id="new-category"></select>
    <select id="new-subcategory" style="display:none;"></select>
  </div>
  <div class="row dates">
    <div><label>Start</label><input id="new-start-date" type="date" /></div>
    <div><label>End</label><input id="new-end-date" type="date" /></div>
  </div>

  <div id="add-cat-row">
    <input id="new-cat-name" type="text" placeholder="New category name" style="flex:1;" />
    <button id="save-cat-btn">Add</button>
    <button id="cancel-cat-btn">Cancel</button>
  </div>

  <div id="add-subcat-row">
    <input id="new-subcat-name" type="text" placeholder="New subcategory name" style="flex:1;" />
    <button id="save-subcat-btn">Add</button>
    <button id="cancel-subcat-btn">Cancel</button>
  </div>

  <button id="add-btn"><i class="ti ti-plus" aria-hidden="true"></i> Add task</button>

  <div class="filters">
    <button class="filter-btn" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <select id="category-filter"></select>
    <span id="count"></span>
  </div>

  <div id="manage-row">
    <button id="manage-toggle"><i class="ti ti-settings" aria-hidden="true"></i> Manage categories</button>
    <div id="manage-panel"></div>
  </div>

  <div id="list"></div>

  <div id="empty">Nothing here yet. Add your first task above.</div>
</div>

<script>
(function(){
  var TASKS_KEY = 'todos';
  var CATS_KEY = 'categories';
  var tasks = [];
  var categories = [];
  var filter = 'all';
  var categoryFilter = 'all';
  var manageOpenFor = null;

  var PALETTE = [
    { bg: '#E6F1FB', text: '#0C447C' },
    { bg: '#EEEDFE', text: '#3C3489' },
    { bg: '#E1F5EE', text: '#085041' },
    { bg: '#FAECE7', text: '#712B13' },
    { bg: '#EAF3DE', text: '#27500A' },
    { bg: '#FBEAF0', text: '#72243E' },
    { bg: '#FAEEDA', text: '#633806' },
    { bg: '#F1EFE8', text: '#444441' }
  ];

  var DEFAULT_CATS = [
    { name: 'Personal', color: PALETTE[0], subcategories: [] },
    { name: 'Work', color: PALETTE[1], subcategories: [] },
    { name: 'Education', color: PALETTE[2], subcategories: [] },
    { name: 'Shopping', color: PALETTE[3], subcategories: [] },
    { name: 'Health', color: PALETTE[4], subcategories: [] },
    { name: 'Other', color: PALETTE[7], subcategories: [] }
  ];

  function uid(){ return 't' + Date.now() + Math.random().toString(36).slice(2,7); }

  function todayStr(){
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatDate(dateStr){
    if(!dateStr) return '';
    var parts = dateStr.split('-');
    var d = new Date(parts[0], parts[1]-1, parts[2]);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function getCategory(name){
    return categories.find(function(c){ return c.name === name; });
  }

  function catColor(name){
    var c = getCategory(name);
    return c ? c.color : PALETTE[7];
  }

  function rollForwardOverdue(){
    var today = todayStr();
    var changed = false;
    tasks.forEach(function(t){
      var endRef = t.endDate || t.date;
      if(!t.done && endRef && endRef < today){
        var span = 0;
        if(t.date && t.endDate){
          span = Math.round((new Date(t.endDate) - new Date(t.date)) / 86400000);
        }
        t.date = today;
        if(t.endDate){
          var newEnd = new Date(today);
          newEnd.setDate(newEnd.getDate() + Math.max(span, 0));
          t.endDate = newEnd.getFullYear() + '-' + String(newEnd.getMonth()+1).padStart(2,'0') + '-' + String(newEnd.getDate()).padStart(2,'0');
        }
        changed = true;
      }
    });
    if(changed) saveTasks();
  }

  function loadAll(){
    try {
      var raw = localStorage.getItem(CATS_KEY);
      categories = raw ? JSON.parse(raw) : DEFAULT_CATS;
    } catch(e) {
      categories = DEFAULT_CATS;
    }
    categories.forEach(function(c){ if(!c.subcategories) c.subcategories = []; });

    try {
      var traw = localStorage.getItem(TASKS_KEY);
      tasks = traw ? JSON.parse(traw) : [];
    } catch(e) {
      tasks = [];
    }
    tasks.forEach(function(t){
      if(!t.category) t.category = 'Other';
      if(t.date === undefined) t.date = '';
      if(t.endDate === undefined) t.endDate = '';
      if(t.subcategory === undefined) t.subcategory = '';
    });

    rollForwardOverdue();
    renderCategoryOptions();
    updateSubcategoryOptions();
    render();
  }

  function saveTasks(){
    try { localStorage.setItem(TASKS_KEY, JSON.stringify(tasks)); }
    catch(e){ console.error('Save failed', e); }
  }

  function saveCategories(){
    try { localStorage.setItem(CATS_KEY, JSON.stringify(categories)); }
    catch(e){ console.error('Save failed', e); }
  }

  function addCategory(name){
    name = name.trim();
    if(!name) return;
    if(categories.some(function(c){ return c.name.toLowerCase() === name.toLowerCase(); })) return;
    var color = PALETTE[categories.length % PALETTE.length];
    categories.push({ name: name, color: color, subcategories: [] });
    saveCategories();
    renderCategoryOptions();
    renderManagePanel();
    document.getElementById('new-category').value = name;
    updateSubcategoryOptions();
  }

  function deleteCategory(name){
    if(categories.length <= 1) return;
    categories = categories.filter(function(c){ return c.name !== name; });
    tasks.forEach(function(t){
      if(t.category === name){ t.category = categories[0].name; t.subcategory = ''; }
    });
    saveCategories();
    saveTasks();
    renderCategoryOptions();
    renderManagePanel();
    updateSubcategoryOptions();
    render();
  }

  function addSubcategory(catName, subName){
    subName = subName.trim();
    if(!subName) return;
    var cat = getCategory(catName);
    if(!cat) return;
    if(cat.subcategories.some(function(s){ return s.toLowerCase() === subName.toLowerCase(); })) return;
    cat.subcategories.push(subName);
    saveCategories();
    renderManagePanel();
    updateSubcategoryOptions();
  }

  function deleteSubcategory(catName, subName){
    var cat = getCategory(catName);
    if(!cat) return;
    cat.subcategories = cat.subcategories.filter(function(s){ return s !== subName; });
    tasks.forEach(function(t){
      if(t.category === catName && t.subcategory === subName) t.subcategory = '';
    });
    saveCategories();
    saveTasks();
    renderManagePanel();
    updateSubcategoryOptions();
    render();
  }

  function updateSubcategoryOptions(){
    var catSel = document.getElementById('new-category');
    var subSel = document.getElementById('new-subcategory');
    var cat = getCategory(catSel.value);
    subSel.innerHTML = '';
    if(cat && cat.subcategories.length > 0){
      var noneOpt = document.createElement('option');
      noneOpt.value = '';
      noneOpt.textContent = 'No subcategory';
      subSel.appendChild(noneOpt);
      cat.subcategories.forEach(function(s){
        var opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        subSel.appendChild(opt);
      });
      subSel.style.display = '';
    } else {
      subSel.style.display = 'none';
    }
  }

  function renderCategoryOptions(){
    var sel = document.getElementById('new-category');
    var filt = document.getElementById('category-filter');
    var prevSel = sel.value;
    var prevFilt = filt.value;

    sel.innerHTML = '';
    categories.forEach(function(c){
      var opt = document.createElement('option');
      opt.value = c.name;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
    var addOpt = document.createElement('option');
    addOpt.value = '__add__';
    addOpt.textContent = '+ New category...';
    sel.appendChild(addOpt);
    if(categories.some(function(c){ return c.name === prevSel; })) sel.value = prevSel;

    filt.innerHTML = '';
    var allOpt = document.createElement('option');
    allOpt.value = 'all';
    allOpt.textContent = 'All categories';
    filt.appendChild(allOpt);
    categories.forEach(function(c){
      var opt = document.createElement('option');
      opt.value = c.name;
      opt.textContent = c.name;
      filt.appendChild(opt);
    });
    if(prevFilt && (prevFilt === 'all' || categories.some(function(c){ return c.name === prevFilt; }))){
      filt.value = prevFilt;
    }
  }

  function renderManagePanel(){
    var panel = document.getElementById('manage-panel');
    panel.innerHTML = '';
    categories.forEach(function(c){
      var block = document.createElement('div');
      block.className = 'cat-block';

      var head = document.createElement('div');
      head.className = 'head';

      var badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = c.name;
      badge.style.background = c.color.bg;
      badge.style.color = c.color.text;
      head.appendChild(badge);

      var addSubBtn = document.createElement('button');
      addSubBtn.textContent = '+ Subcategory';
      addSubBtn.style.fontSize = '11px';
      addSubBtn.style.padding = '3px 8px';
      addSubBtn.style.height = 'auto';
      addSubBtn.onclick = function(){
        manageOpenFor = c.name;
        document.getElementById('add-subcat-row').style.display = 'flex';
        document.getElementById('new-subcat-name').focus();
      };
      head.appendChild(addSubBtn);

      if(categories.length > 1){
        var delBtn = document.createElement('button');
        delBtn.className = 'icon-btn';
        delBtn.style.marginLeft = 'auto';
        delBtn.setAttribute('aria-label', 'Delete ' + c.name + ' category');
        delBtn.innerHTML = '<i class="ti ti-trash" aria-hidden="true"></i>';
        delBtn.onclick = function(){ deleteCategory(c.name); };
        head.appendChild(delBtn);
      }

      block.appendChild(head);

      if(c.subcategories.length > 0){
        var subRow = document.createElement('div');
        subRow.className = 'sub-row';
        c.subcategories.forEach(function(s){
          var chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = s;
          var x = document.createElement('button');
          x.setAttribute('aria-label', 'Delete ' + s + ' subcategory');
          x.innerHTML = '<i class="ti ti-x" aria-hidden="true"></i>';
          x.onclick = function(){ deleteSubcategory(c.name, s); };
          chip.appendChild(x);
          subRow.appendChild(chip);
        });
        block.appendChild(subRow);
      }

      panel.appendChild(block);
    });
  }

  function addTask(text, category, subcategory, startDate, endDate){
    text = text.trim();
    if(!text) return;
    tasks.unshift({ id: uid(), text: text, done: false, category: category || categories[0].name, subcategory: subcategory || '', date: startDate || '', endDate: endDate || '' });
    saveTasks();
    render();
  }

  function toggleTask(id){
    var t = tasks.find(function(x){ return x.id === id; });
    if(t){ t.done = !t.done; saveTasks(); render(); }
  }

  function deleteTask(id){
    tasks = tasks.filter(function(x){ return x.id !== id; });
    saveTasks();
    render();
  }

  function render(){
    var list = document.getElementById('list');
    var empty = document.getElementById('empty');
    var countEl = document.getElementById('count');

    document.querySelectorAll('.filter-btn').forEach(function(btn){
      var active = btn.getAttribute('data-filter') === filter;
      btn.classList.toggle('active', active);
    });

    var visible = tasks.filter(function(t){
      if(filter === 'active' && t.done) return false;
      if(filter === 'done' && !t.done) return false;
      if(categoryFilter !== 'all' && t.category !== categoryFilter) return false;
      return true;
    });

    var remaining = tasks.filter(function(t){ return !t.done; }).length;
    countEl.textContent = remaining + ' left';

    list.innerHTML = '';
    if(visible.length === 0){
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      visible.forEach(function(t){
        var row = document.createElement('div');
        row.className = 'task-row';

        var check = document.createElement('button');
        check.className = 'check' + (t.done ? ' done' : '');
        check.setAttribute('aria-label', t.done ? 'Mark as not done' : 'Mark as done');
        if(t.done){
          check.innerHTML = '<i class="ti ti-check" style="font-size:13px; color:var(--accent-text);" aria-hidden="true"></i>';
        }
        check.onclick = function(){ toggleTask(t.id); };

        var mid = document.createElement('div');
        mid.className = 'mid';

        var label = document.createElement('span');
        label.textContent = t.text;
        label.className = 'label' + (t.done ? ' done' : '');

        var meta = document.createElement('div');
        meta.className = 'meta';

        var colors = catColor(t.category);
        var badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = t.category;
        badge.style.background = colors.bg;
        badge.style.color = colors.text;
        badge.style.fontSize = '11px';
        badge.style.padding = '2px 8px';
        meta.appendChild(badge);

        if(t.subcategory){
          var subBadge = document.createElement('span');
          subBadge.textContent = t.subcategory;
          subBadge.style.fontSize = '11px';
          subBadge.style.padding = '2px 8px';
          subBadge.style.borderRadius = 'var(--radius)';
          subBadge.style.background = 'var(--surface-1)';
          subBadge.style.color = 'var(--text-secondary)';
          meta.appendChild(subBadge);
        }

        if(t.date || t.endDate){
          var dateEl = document.createElement('span');
          var dateText = '';
          if(t.date && t.endDate && t.date !== t.endDate){
            dateText = formatDate(t.date) + ' \u2192 ' + formatDate(t.endDate);
          } else if(t.date){
            dateText = formatDate(t.date);
          } else if(t.endDate){
            dateText = formatDate(t.endDate);
          }
          dateEl.className = 'date';
          dateEl.innerHTML = '<i class="ti ti-calendar" style="font-size:12px; vertical-align:-1px;" aria-hidden="true"></i> ' + dateText;
          meta.appendChild(dateEl);
        }

        mid.appendChild(label);
        mid.appendChild(meta);

        var del = document.createElement('button');
        del.className = 'del';
        del.setAttribute('aria-label', 'Delete task');
        del.innerHTML = '<i class="ti ti-trash" style="font-size:16px;" aria-hidden="true"></i>';
        del.onclick = function(){ deleteTask(t.id); };

        row.appendChild(check);
        row.appendChild(mid);
        row.appendChild(del);
        list.appendChild(row);
      });
    }
  }

  document.getElementById('add-btn').onclick = function(){
    var input = document.getElementById('new-task');
    var cat = document.getElementById('new-category');
    var sub = document.getElementById('new-subcategory');
    var startDate = document.getElementById('new-start-date');
    var endDate = document.getElementById('new-end-date');
    if(cat.value === '__add__') return;
    addTask(input.value, cat.value, sub.style.display !== 'none' ? sub.value : '', startDate.value, endDate.value);
    input.value = '';
    startDate.value = '';
    endDate.value = '';
    input.focus();
  };
  document.getElementById('new-task').addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      document.getElementById('add-btn').click();
    }
  });

  document.getElementById('new-category').addEventListener('change', function(){
    if(this.value === '__add__'){
      document.getElementById('add-cat-row').style.display = 'flex';
      document.getElementById('new-cat-name').focus();
    } else {
      updateSubcategoryOptions();
    }
  });
  document.getElementById('save-cat-btn').onclick = function(){
    var input = document.getElementById('new-cat-name');
    addCategory(input.value);
    input.value = '';
    document.getElementById('add-cat-row').style.display = 'none';
  };
  document.getElementById('cancel-cat-btn').onclick = function(){
    document.getElementById('new-cat-name').value = '';
    document.getElementById('add-cat-row').style.display = 'none';
    document.getElementById('new-category').value = categories[0].name;
    updateSubcategoryOptions();
  };
  document.getElementById('new-cat-name').addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ document.getElementById('save-cat-btn').click(); }
  });

  document.getElementById('save-subcat-btn').onclick = function(){
    var input = document.getElementById('new-subcat-name');
    if(manageOpenFor){
      addSubcategory(manageOpenFor, input.value);
    }
    input.value = '';
    document.getElementById('add-subcat-row').style.display = 'none';
    manageOpenFor = null;
  };
  document.getElementById('cancel-subcat-btn').onclick = function(){
    document.getElementById('new-subcat-name').value = '';
    document.getElementById('add-subcat-row').style.display = 'none';
    manageOpenFor = null;
  };
  document.getElementById('new-subcat-name').addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ document.getElementById('save-subcat-btn').click(); }
  });

  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.onclick = function(){
      filter = btn.getAttribute('data-filter');
      render();
    };
  });
  document.getElementById('category-filter').onchange = function(){
    categoryFilter = this.value;
    render();
  };

  document.getElementById('manage-toggle').onclick = function(){
    var panel = document.getElementById('manage-panel');
    var showing = panel.style.display === 'flex';
    panel.style.display = showing ? 'none' : 'flex';
    if(!showing) renderManagePanel();
  };

  loadAll();
})();
</script>
</body>
</html>
